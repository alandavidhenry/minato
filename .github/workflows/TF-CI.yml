name: TF - CI

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      DATABASE_URL:
        required: true
      GHCR_PAT:
        required: true

jobs:
  CI:
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    defaults:
      run:
        working-directory: infrastructure/env/${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_github_token: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.15"

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan --out tf.plan
          terraform show -json tf.plan | jq '.' > tf.json

      # - name: Run Checkov
      #   run: |
      #     docker run \
      #       -v $(pwd)/tf.json:/tf/tf.json \
      #       --workdir /tf \
      #       bridgecrew/checkov:latest \
      #       --file tf.json --soft-fail --framework terraform_plan
