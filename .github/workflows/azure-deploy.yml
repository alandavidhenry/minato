name: Deploy to Azure

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: string
      image_uri:
        description: Docker image URI to deploy
        required: true
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: true
      DATABASE_URL:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          images: ${{ inputs.image_uri }}

      - name: Smoke test
        run: |
          APP_URL="https://${{ vars.AZURE_APP_NAME }}.azurewebsites.net"
          echo "Smoke testing $APP_URL..."
          for i in $(seq 1 12); do
            BODY=$(curl -sf "$APP_URL/api/health" 2>/dev/null || echo '{}')
            STATUS=$(echo "$BODY" | jq -r '.status' 2>/dev/null || echo 'error')
            if [ "$STATUS" = "ok" ]; then
              echo "Smoke test passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed after 12 attempts"
          exit 1
