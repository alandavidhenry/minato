name: Production Deployment

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  lint_and_test:
    name: Lint and Test
    uses: ./.github/workflows/lint-format.yml

  security_scan:
    name: Security Scan
    uses: ./.github/workflows/security-scan.yml
    with:
      run_advanced_scans: true

  setup:
    name: Setup Deployment
    needs: [lint_and_test, security_scan]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from release tag
        id: extract-version
        run: |
          # Strip leading 'v' from tag name (e.g. v1.2.3 → 1.2.3)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version extracted: $VERSION"

  build:
    name: Build Docker Image
    needs: setup
    uses: ./.github/workflows/docker-build.yml
    with:
      environment: prod
      version: ${{ needs.setup.outputs.version }}

  deploy:
    name: Deploy to Azure Prod
    needs: [setup, build]
    uses: ./.github/workflows/azure-deploy.yml
    with:
      environment: prod
      image_uri: ${{ needs.build.outputs.image_uri }}
      azure_app_name: ${{ vars.AZURE_APP_NAME }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
